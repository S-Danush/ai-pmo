<div class="login-page">
  <div class="login-brand">
    <span class="login-logo">◆</span>
    <span class="login-brand-text">AI PMO Agent</span>
  </div>

  <div class="login-card">
    <h1 class="login-title">Sign in</h1>
    <p class="login-sub">Use demo credentials to access the command center.</p>

    <div class="login-error" *ngIf="error" role="alert">{{ error }}</div>

    <form (ngSubmit)="submit()" autocomplete="on">
      <label class="field">
        <span class="field-label">Username</span>
        <span class="input-wrap">
          <svg class="field-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path fill="currentColor" d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
          </svg>
          <input
            name="username"
            [(ngModel)]="username"
            type="text"
            class="input"
            placeholder="admin"
            autocomplete="username"
          />
        </span>
      </label>

      <label class="field">
        <span class="field-label">Password</span>
        <span class="input-wrap">
          <svg class="field-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path fill="currentColor" d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
          </svg>
          <input
            name="password"
            [(ngModel)]="password"
            type="password"
            class="input"
            placeholder="••••"
            autocomplete="current-password"
          />
        </span>
      </label>

      <button type="submit" class="btn-login" [disabled]="submitting">
        {{ submitting ? 'Signing in…' : 'Login' }}
      </button>
    </form>
  </div>
</div>
