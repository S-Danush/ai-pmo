# =============================================================================
# ai-pmo-agent backend — defaults and placeholders (replace where noted).
# Override secrets in env or optional: file:./config/local-keys.properties (gitignored).
# =============================================================================
spring.config.import=optional:file:./config/local-keys.properties

server.port=8080

# Agent pipeline audit logs (use DEBUG for raw API snippets / metrics detail)
logging.level.com.aipmo.agent=INFO

# -----------------------------------------------------------------------------
# OpenAI
# -----------------------------------------------------------------------------
# Empty = metric-only AI fallback (no live OpenAI). Set a real key via OPENAI_API_KEY or local-keys.
openai.api.key=
openai.model=gpt-4o-mini
# In-memory AI result cache (minutes)
ai.cache.ttl.minutes=30
# When true, a failed live OpenAI insight (after retries) aborts the agent run instead of using fallback text.
ai.fail-fast=false
# OpenAI HTTP retries (transient network / 429 / 502–504 only)
ai.openai.max-attempts=3
# OpenAI-only timeouts (ms); also used by RestTemplate + Apache HttpClient in SslConfig
http.client.openai.connect-timeout-ms=5000
http.client.openai.read-timeout-ms=10000
# LOCAL DEV ONLY: true disables certificate verification for the OpenAI RestClient only — never in production.
http.client.openai.trust-all-certificates=false

# -----------------------------------------------------------------------------
# Microsoft Teams (optional notifications)
# -----------------------------------------------------------------------------
# YOUR_URL = disabled (NotificationService skips). Replace with a real incoming webhook URL to enable.
teams.webhook.url=YOUR_URL

# -----------------------------------------------------------------------------
# Jira (required for non-simulation runs; incomplete config or API errors fail fast)
# -----------------------------------------------------------------------------
# Base URL without trailing slash
jira.base.url=https://vivriti.atlassian.net
# Atlassian account email for the API token
jira.email=replace-with-your-atlassian-email@example.com
# Empty until you set a real token in local-keys.properties (do not commit tokens here).
jira.api.token=
# Leave blank to derive from jira.project; or set a full JQL (then project is ignored for resolution).
jira.jql=
jira.project=VAIL
# Comma-separated; JQL gets issuetype IN (...); responses are also filtered in code (excludes Sub-task by default)
jira.issue.types=Story,Task,Bug
# When true, resolved JQL appends open work filter (e.g. statusCategory != Done)
jira.open-tickets-only=true
jira.search.max=50

# -----------------------------------------------------------------------------
# GitHub (optional — PR timing enrichment)
# -----------------------------------------------------------------------------
# Empty token = GitHub integration skipped (no API calls). Set a PAT in local-keys.properties when ready.
github.token=
# owner/repo format
github.repo=vivriti/ai-pmo-agent

# -----------------------------------------------------------------------------
# Metrics engine (dwell / PR / bounce thresholds)
# -----------------------------------------------------------------------------
metrics.stuck-hours=24
metrics.critical-hours=48
metrics.pr-delay-ratio=1.4
metrics.anomaly-ratio=1.5
metrics.min-pr-samples=3
metrics.min-dwell-samples=3
metrics.bounce-ping-pong-min=3

# -----------------------------------------------------------------------------
# Integration cache (merged ticket list; seconds)
# -----------------------------------------------------------------------------
integration.cache.ttl.seconds=120

# -----------------------------------------------------------------------------
# HTTP clients — Jira, GitHub (shared ClientHttpRequestFactory)
# -----------------------------------------------------------------------------
http.client.connect-timeout-ms=10000
http.client.read-timeout-ms=45000

# -----------------------------------------------------------------------------
# TLS / custom truststore (production). See README-SSL.md
# -----------------------------------------------------------------------------
# Leave blank to use JVM default trust (recommended for local dev).
ssl.truststore.path=
ssl.truststore.password=
# Leave blank to use KeyStore.getDefaultType(); set e.g. PKCS12 or JKS if needed
ssl.truststore.type=
# TLS probe to https://api.openai.com on startup (logs only; set false in air-gapped CI)
ssl.startup-validation.enabled=true

# -----------------------------------------------------------------------------
# Corporate HTTP proxy (scheme http:// implied for CONNECT tunneling)
# -----------------------------------------------------------------------------
# Leave host blank for no proxy. If set, use a positive proxy.port (see SslConfig).
proxy.host=
proxy.port=0
