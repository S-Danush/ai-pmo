# ai-pmo-agent — simulation-only prototype (no API keys, no external services).
server.port=${PORT:8080}

# Comma-separated browser origins allowed to call /api/** (e.g. https://your-app.netlify.app).
# Override on Render with APP_CORS_ALLOWED_ORIGINS.
app.cors.allowed-origins=http://localhost:4200
logging.level.com.aipmo.agent=INFO

# Metrics engine (dwell / PR / bounce thresholds)
metrics.stuck-hours=24
metrics.critical-hours=48
metrics.pr-delay-ratio=1.4
metrics.anomaly-ratio=1.5
metrics.min-pr-samples=3
metrics.min-dwell-samples=3
metrics.bounce-ping-pong-min=3

# Microsoft Teams incoming webhook (optional). When set, POST /api/notify/{ticketId} sends here.
teams.webhook.url=https://vivriticapital.webhook.office.com/webhookb2/9a2df8ab-8bdf-45d1-a8ba-9842bcb140d7@54526d45-a91c-455a-a023-49951eceaaa5/IncomingWebhook/f280ef2da8f842cea7bbf86eb913c74b/ecc844f9-d1ec-4fa8-9773-a7d129dbdb8f/V27WIJDshrXqozjGaQ9nNlrZoXW-u4JFrjGaa9Hww13xY1

# AI insight cache TTL for agent + manual notify (minutes)
ai.cache.ttl.minutes=120
