# ai-pmo-agent — simulation-only prototype (no API keys, no external services).
server.port=${PORT:8080}

# Comma-separated origins/patterns for /api/** (Netlify proxy still sends browser Origin to the API).
# Override on Render with APP_CORS_ALLOWED_ORIGINS (e.g. add your custom domain).
app.cors.allowed-origins=http://localhost:4200,https://*.netlify.app
logging.level.com.aipmo.agent=INFO

# Metrics engine (dwell / PR / bounce thresholds)
metrics.stuck-hours=24
metrics.critical-hours=48
metrics.pr-delay-ratio=1.4
metrics.anomaly-ratio=1.5
metrics.min-pr-samples=3
metrics.min-dwell-samples=3
metrics.bounce-ping-pong-min=3

# Microsoft Teams incoming webhook (optional). When set, POST /api/notify/{ticketId} sends here.
teams.webhook.url=https://default54526d45a91c455aa02349951eceaa.a5.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/bae1f412b09443609a01fbf7c4db46db/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=gFlUZEZ8asRovEtOUdzHIh2zT1iTfhWVLO4WrDWyj4g

# AI insight cache TTL for agent + manual notify (minutes)
ai.cache.ttl.minutes=120
